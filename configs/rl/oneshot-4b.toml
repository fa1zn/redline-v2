# One-shot hosted GRPO run on redline-v2.
# Goal: show mean reward AND logroll_index climbing from a base-model floor.
# Budget-sized for a single run under ~$40, monitored live via `prime train usage`.

name = "redline-v2-grpo-oneshot"
model = "Qwen/Qwen3.5-4B"
loss = "rl"

max_steps = 70
batch_size = 128            # total rollout samples per step (16 groups of 8)
rollouts_per_example = 8

[sampling]
max_tokens = 512
enable_thinking = false

[[env]]
id = "fa1zvn/redline-v2@0.2.1"
# Denser training reward: no-deal offers score by how close they came, so a weak
# base with a low close rate still gets gradient. Clean buyer_score is reported as
# a metric. Verified to cut GRPO dead groups from ~34% to ~3% on Qwen3.5-4B.
args = { train_shaping = true }

# Online evals run on the CLEAN buyer_score (no shaping here) to capture the
# base-model floor (step 0) and the curve, including the logroll_index metric
# that proves the model learns to trade, not hack.
[eval]
interval = 10
num_examples = 32
rollouts_per_example = 1
eval_base_model = true

[[eval.env]]
id = "fa1zvn/redline-v2@0.2.1"
